<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Platform 购物平台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav id="navbar">
    <div class="nav-brand" onclick="navigate('home')">ShopPlatform</div>
    <div class="nav-links">
      <a href="#" onclick="navigate('home');return false">首页</a>
      <a href="#" onclick="navigate('products');return false">商品</a>
      <a href="#" onclick="navigate('cart');return false">购物车 <span id="cart-badge" class="badge" style="display:none">0</span></a>
      <a href="#" onclick="navigate('orders');return false">我的订单</a>
      <a href="#" id="admin-link" style="display:none" onclick="navigate('admin');return false">管理后台</a>
    </div>
    <div class="nav-auth">
      <span id="user-info" style="display:none">
        <span id="user-name"></span>
        <span id="user-role" class="role-tag"></span>
        <button onclick="logout()" class="btn btn-sm">退出</button>
        <button onclick="document.getElementById('pwd-modal').style.display='flex'" class="btn btn-sm">改密码</button>
      </span>
      <span id="auth-buttons">
        <button onclick="showAuth('login')" class="btn btn-sm">登录</button>
        <button onclick="showAuth('register')" class="btn btn-sm btn-primary">注册</button>
      </span>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main id="main-content">
    <!-- 首页 -->
    <div id="page-home" class="page">
      <div class="hero">
        <h1>欢迎来到 Shop Platform</h1>
        <p>管理员 · 超级用户 · 普通用户 — 不同角色，不同体验</p>
        <button onclick="navigate('products')" class="btn btn-lg btn-primary">开始购物</button>
      </div>
      <div class="features">
        <div class="feature-card">
          <h3>普通用户</h3>
          <p>浏览商品、购物车、下单</p>
        </div>
        <div class="feature-card">
          <h3>超级用户</h3>
          <p>专属 8.5 折 · 特殊商品 · 优先购买</p>
        </div>
        <div class="feature-card">
          <h3>管理员</h3>
          <p>商品管理 · 用户管理 · 订单管理</p>
        </div>
      </div>
    </div>

    <!-- 商品列表页 -->
    <div id="page-products" class="page" style="display:none">
      <h2>商品列表</h2>
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="搜索商品..." oninput="filterProducts()">
        <select id="category-filter" onchange="filterProducts()">
          <option value="">全部分类</option>
        </select>
      </div>
      <div id="product-grid" class="product-grid"></div>
    </div>

    <!-- 购物车页 -->
    <div id="page-cart" class="page" style="display:none">
      <h2>购物车</h2>
      <div id="cart-content"></div>
    </div>

    <!-- 订单页 -->
    <div id="page-orders" class="page" style="display:none">
      <h2>我的订单</h2>
      <div id="orders-content"></div>
    </div>

    <!-- 管理后台 -->
    <div id="page-admin" class="page" style="display:none">
      <h2>管理后台</h2>
      <div class="admin-stats" id="admin-stats"></div>
      <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchAdminTab('products')">商品管理</button>
        <button class="tab-btn" onclick="switchAdminTab('users')">用户管理</button>
        <button class="tab-btn" onclick="switchAdminTab('orders')">订单管理</button>
      </div>
      <div id="admin-products" class="admin-panel"></div>
      <div id="admin-users" class="admin-panel" style="display:none"></div>
      <div id="admin-orders" class="admin-panel" style="display:none"></div>
    </div>
  </main>

  <!-- 登录/注册弹窗 -->
  <div id="auth-modal" class="modal" style="display:none">
    <div class="modal-content">
      <span class="modal-close" onclick="closeAuth()">&times;</span>
      <div id="auth-form"></div>
    </div>
  </div>

  <!-- 商品编辑弹窗 -->
  <div id="product-modal" class="modal" style="display:none">
    <div class="modal-content">
      <span class="modal-close" onclick="closeProductModal()">&times;</span>
      <h3 id="product-modal-title">编辑商品</h3>
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="pf-id">
        <div class="form-group"><label>商品名称</label><input type="text" id="pf-name" required></div>
        <div class="form-group"><label>描述</label><textarea id="pf-desc" rows="3"></textarea></div>
        <div class="form-group"><label>价格</label><input type="number" id="pf-price" step="0.01" required></div>
        <div class="form-group"><label>库存</label><input type="number" id="pf-stock" required></div>
        <div class="form-group"><label>分类</label><input type="text" id="pf-category"></div>
        <div class="form-group"><label><input type="checkbox" id="pf-special"> 特殊商品（仅超级用户可见）</label></div>
        <button type="submit" class="btn btn-primary">保存</button>
      </form>
    </div>
  </div>

  <!-- 消息提示 -->
  <div id="toast" class="toast"></div>

  <!-- 修改密码弹窗 -->
  <div id="pwd-modal" class="modal" style="display:none">
    <div class="modal-content">
      <span class="modal-close" onclick="document.getElementById('pwd-modal').style.display='none'">&times;</span>
      <h3>修改密码</h3>
      <div class="form-group"><label>旧密码</label><input type="password" id="pwd-old"></div>
      <div class="form-group"><label>新密码（至少6位）</label><input type="password" id="pwd-new"></div>
      <div class="form-group"><label>确认新密码</label><input type="password" id="pwd-confirm" onkeydown="if(event.key==='Enter')changePassword()"></div>
      <button class="btn btn-primary" style="width:100%" onclick="changePassword()">确认修改</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
